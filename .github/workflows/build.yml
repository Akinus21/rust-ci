name: Nightly Image Rebuild

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/akinus21/rust-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          pull: true

      - name: Report
        run: |
          echo "=== Rebuild complete ==="
          echo "Triggered: ${{ github.event_name }}"
          echo "SHA: ${{ github.sha }}"
